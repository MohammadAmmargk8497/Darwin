# Darwin research agent — local orchestration.
#
# Brings up two services on a private bridge network:
#   - ollama: official Ollama server, models persisted in a named volume
#   - darwin: the Streamlit UI + MCP stack, on port 8501
#
# Usage:
#     docker compose up -d --build    # first run: pulls images, pulls model
#     docker compose logs -f darwin   # watch the startup + model pull
#     docker compose down             # stop everything
#     docker compose down -v          # stop AND drop the model volume

services:
  ollama:
    image: ollama/ollama:latest
    container_name: darwin-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_KEEP_ALIVE: "1h"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  darwin:
    build:
      context: .
      dockerfile: Dockerfile
    image: darwin-agent:latest
    container_name: darwin-agent
    # Match container process UID/GID to the host user so files written to
    # the bind-mounted papers/, vault, and logs/ are owned by the host user,
    # not root. docker-run.sh exports PUID/PGID; fallback is 1000 (Ubuntu's
    # default non-root UID).
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      PROVIDER: "${PROVIDER:-ollama}"
      MODEL_NAME: "${MODEL_NAME:-llama3.2:3b}"
      API_BASE: "http://ollama:11434"
      # These are forwarded from a host-level .env if the user created one.
      # Empty by default — Darwin doesn't need them unless the vault is
      # driven by the Obsidian Local REST API plugin.
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OBSIDIAN_API_KEY: "${OBSIDIAN_API_KEY:-}"
      DARWIN_LOG_LEVEL: "${DARWIN_LOG_LEVEL:-INFO}"
    volumes:
      # Bind mounts so the host can inspect papers/notes/logs directly.
      # Directories are auto-created by Docker if they don't exist.
      - ./papers:/data/papers
      - ./Darwin Research:/data/vault
      - ./logs:/data/logs
    restart: unless-stopped

volumes:
  ollama_models:
